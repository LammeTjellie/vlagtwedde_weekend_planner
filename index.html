<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#fdfcf9">
  
  <meta name="apple-mobile-web-app-title" content="Paas Planner" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/4336/4336968.png" /> 
  <title>Weekend Planner Vlagtwedde - Pasen</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fdfcf9; --stone-100: #f5f5f0; --stone-200: #e7e5e0; --stone-400: #a8a29e; --stone-500: #78716c; --stone-900: #1c1917; --orange: #ea580c; --easter-pink: #fce7f3; --easter-yellow: #fef9c3; --easter-green: #dcfce7; }
    
    html, body { 
      height: 100%;
      background: var(--bg); 
      color: var(--stone-900); 
      font-family: 'DM Sans', sans-serif;
    }

    /* PWA Fullscreen Header aanpassing */
    header { 
      position: relative; 
      overflow: hidden; 
      /* Ruimte bovenin voor de statusbar van de telefoon */
      padding: calc(env(safe-area-inset-top) + 2rem) 1.5rem 3rem; 
      border-bottom: 6px solid var(--easter-green); 
      background: linear-gradient(to bottom, #fff, var(--easter-yellow)); 
    }

    .header-inner { max-width: 1024px; margin: 0 auto; position: relative; z-index: 1; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
    
    /* Installatie knop stijl */
    .install-pill {
      display: none; /* Alleen tonen via JS als installatie mogelijk is */
      align-items: center;
      gap: 6px;
      background: var(--orange);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
      animation: subtlePulse 3s infinite ease-in-out;
      white-space: nowrap;
    }
    .install-pill.visible { display: flex; }

    @keyframes subtlePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); box-shadow: 0 6px 15px rgba(234, 88, 12, 0.4); }
      100% { transform: scale(1); }
    }

    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 4rem); line-height: 1.1; color: var(--stone-900); font-style: italic; }
    h1 span { font-style: normal; font-family: 'DM Sans', sans-serif; font-weight: 900; text-transform: uppercase; color: var(--orange); display: block; }
    
    .header-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; color: var(--stone-900); cursor: pointer; transition: all 0.2s; text-decoration: none; }
    
    /* Rest van je CSS blijft ongewijzigd */
    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 2rem; }
    .filter-btn { padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; color: var(--stone-500); cursor: pointer; }
    .filter-btn.active { background: var(--stone-900); color: white; }
    main { max-width: 1024px; margin: 0 auto; padding: 3rem 1.5rem; }
    .activities-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 640px) { .activities-grid { grid-template-columns: repeat(2, 1fr); } }
    .activity-card { background: white; border: 1px solid var(--stone-200); border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; }
    .card-image-wrap { aspect-ratio: 16/10; overflow: hidden; position: relative; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 2rem; flex-grow: 1; display: flex; flex-direction: column; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; margin-bottom: 1rem; }
    .card-desc { color: var(--stone-500); font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; flex-grow: 1; }
    .vote-container { display: flex; gap: 0.5rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--stone-100); }
    .vote-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.6rem; border-radius: 1rem; border: 1px solid var(--stone-200); background: white; cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 1rem; background: rgba(28,25,23,0.4); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }
    .modal-panel { background: var(--stone-900); color: white; border-radius: 2.5rem; padding: 1.75rem; max-width: 420px; width: 100%; }
    .ws-grid { display: grid; grid-template-columns: repeat(12, 1fr); background: #3f3a36; padding: 2px; border-radius: 0.75rem; touch-action: none; position: relative; }
    .ws-cell { aspect-ratio: 1; background: #292524; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 900; color: #d6d3d1; }
    .word-line { position: absolute; height: 2px; background: rgba(16, 185, 129, 0.6); z-index: 5; pointer-events: none; transform-origin: left center; }
    .win-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
    .win-overlay.visible { display: flex; }
    footer { text-align: center; padding: 3rem 1.5rem; color: var(--stone-400); font-size: 0.7rem; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">🐰 Paasweekend 2026</div>
        <h1>Vlagtwedde<br><span>Weekend Planner</span></h1>
      </div>
      <button id="pwaInstallBtn" class="install-pill">
        <span>📲</span> App Installeren
      </button>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openModal('wsModal')">🧩 Woordzoeker</button>
      <button class="btn" onclick="openModal('bingoModal')">🧺 Paas-Bingo</button>
      <button class="btn" onclick="openModal('weatherModal')">
        <span id="wIcon">⛅</span> <span id="wTemp">--°</span>
      </button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alles</button>
      <button class="filter-btn" onclick="setFilter('bezienswaardigheid', this)">Bezienswaardigheid</button>
      <button class="filter-btn" onclick="setFilter('attractie', this)">Attractie</button>
      <button class="filter-btn" onclick="setFilter('activiteit', this)">Activiteit</button>
      <button class="filter-btn" onclick="setFilter('shoppen', this)">Shoppen</button>
    </div>
  </div>
</header>

<main>
  <div class="activities-grid" id="activitiesGrid"></div>
</main>

<div class="modal-overlay" id="wsModal" onclick="if(event.target===this)closeModal('wsModal')">
  <div class="modal-panel" style="max-width: 500px;">
    <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <div class="modal-title">Paas Woordzoeker 🧩</div>
      <button class="modal-close" onclick="closeModal('wsModal')" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
    </div>
    <div class="ws-grid" id="wsGrid"></div>
    <div id="wsWords" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:1rem;"></div>
    <button class="btn" style="width:100%; margin-top:1.5rem; background:#292524; color:white; border:none;" onclick="initWordSearch()">🔄 Nieuwe Puzzel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDM-7IhOf0gRKVDv8rCdvQrKkRKd6kP9-A",
    authDomain: "paas-planner.firebaseapp.com",
    projectId: "paas-planner",
    storageBucket: "paas-planner.firebasestorage.app",
    messagingSenderId: "423781486356",
    appId: "1:423781486356:web:99aa95df4a36b455b9bc01"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* --- VERBETERDE PWA INSTALLATIE LOGICA --- */
  let deferredPrompt;
  const installBtn = document.getElementById('pwaInstallBtn');

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if(installBtn) installBtn.classList.add('visible');
  });

  if(installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.classList.remove('visible');
      }
      deferredPrompt = null;
    });
  }

  window.addEventListener('appinstalled', () => {
    if(installBtn) installBtn.classList.remove('visible');
    deferredPrompt = null;
  });

  /* --- DE REST VAN JE BESTAANDE LOGICA --- */
  // (Hier komen je ACTIVITIES, BINGO_ITEMS, initWordSearch, fetchWeather, etc.)
  // Zorg dat je de volledige functies uit je vorige index.html hier weer plakt.

  // Belangrijk: roep de functies aan om alles te starten
  renderActivities();
  // renderBingo(); 
  fetchWeather();
  initWordSearch();
</script>
</body>
</html>
