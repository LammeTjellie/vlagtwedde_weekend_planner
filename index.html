<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Paas Planner" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/4336/4336968.png" /> 
  <title>Weekend Planner Vlagtwedde - Pasen</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fdfcf9; --stone-100: #f5f5f0; --stone-200: #e7e5e0; --stone-400: #a8a29e; --stone-500: #78716c; --stone-900: #1c1917; --orange: #ea580c; --easter-pink: #fce7f3; --easter-yellow: #fef9c3; --easter-green: #dcfce7; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--bg); color: var(--stone-900); font-family: 'DM Sans', sans-serif; min-height: 100vh; position: relative; }
    
    header { position: relative; overflow: hidden; padding: 4rem 1.5rem 3rem; border-bottom: 6px solid var(--easter-green); background: linear-gradient(to bottom, #fff, var(--easter-yellow)); }
    .header-inner { max-width: 1024px; margin: 0 auto; position: relative; z-index: 1; }
    .header-top { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
    @media (min-width: 768px) { .header-top { flex-direction: row; justify-content: space-between; align-items: flex-start; } }
    .header-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone-500); margin-bottom: 0.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1.1; color: var(--stone-900); font-style: italic; }
    h1 span { font-style: normal; font-family: 'DM Sans', sans-serif; font-weight: 900; text-transform: uppercase; color: var(--orange); display: block; }
    
    .header-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-start; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; color: var(--stone-900); cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .btn:hover { background: var(--stone-100); }
    .btn-visit { margin-top: 1rem; background: var(--stone-900); color: white; width: 100%; justify-content: center; border: none; }
    
    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 2rem; }
    .filter-btn { padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; color: var(--stone-500); cursor: pointer; transition: all 0.3s; }
    .filter-btn.active { background: var(--stone-900); border-color: var(--stone-900); color: white; }

    main { max-width: 1024px; margin: 0 auto; padding: 3rem 1.5rem; }
    .activities-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 640px) { .activities-grid { grid-template-columns: repeat(2, 1fr); } }
    .activity-card { background: white; border: 1px solid var(--stone-200); border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; }
    .card-image-wrap { aspect-ratio: 16/10; overflow: hidden; position: relative; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 2rem; flex-grow: 1; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 1rem; background: rgba(28,25,23,0.4); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }
    .modal-panel { background: var(--stone-900); color: white; border-radius: 2.5rem; padding: 1.5rem; max-width: 450px; width: 100%; transform: translateY(30px); transition: transform 0.3s; max-height: 90vh; overflow-y: auto; }
    .modal-overlay.visible .modal-panel { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-close { width: 2.5rem; height: 2.5rem; border-radius: 50%; background: #292524; border: none; color: white; cursor: pointer; }

    /* Woordzoeker Specifiek */
    .wordsearch-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 2px; background: #3f3a36; padding: 2px; border-radius: 8px; margin-bottom: 1rem; }
    .ws-cell { aspect-ratio: 1; background: #292524; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; cursor: pointer; user-select: none; border-radius: 2px; }
    .ws-cell.selected { background: var(--orange); color: white; }
    .ws-cell.found { background: var(--easter-green); color: #065f46; }
    .word-list { display: flex; flex-wrap: wrap; gap: 0.4rem; font-size: 0.7rem; }
    .word-item { padding: 0.2rem 0.5rem; background: #3f3a36; border-radius: 4px; color: #a8a29e; }
    .word-item.found { text-decoration: line-through; opacity: 0.4; background: var(--easter-green); color: black; }

    /* Bingo & Win Overlays */
    .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .bingo-item { aspect-ratio: 1; padding: 0.5rem; border-radius: 1rem; background: #292524; border: 2px solid #3f3a36; font-size: 0.7rem; text-align: center; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
    .bingo-item.checked { background: var(--orange); color: white; }
    
    .win-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 2rem; }
    .win-overlay.visible { display: flex; }
    .win-overlay img { max-width: 80%; border-radius: 2rem; margin-bottom: 1rem; }

    .falling-egg { position: fixed; top: -50px; z-index: 999; font-size: 2rem; pointer-events: none; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    footer { text-align: center; padding: 3rem 1.5rem; color: var(--stone-400); font-size: 0.7rem; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">🐰 Paasweekend 2026</div>
        <h1>Vlagtwedde<br><span>Weekend Planner</span></h1>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="openModal('bingoModal')">🧺 Bingo</button>
        <button class="btn" onclick="openModal('wordSearchModal')">🧩 Woordzoeker</button>
        <button class="btn" onclick="openModal('weatherModal')">
          <span id="wIcon">⛅</span> <span id="wTemp">--°</span>
        </button>
      </div>
    </div>
    <div class="filters" id="filterBar"></div>
  </div>
</header>

<main><div class="activities-grid" id="activitiesGrid"></div></main>

<div class="modal-overlay" id="bingoModal" onclick="if(event.target===this)closeModal('bingoModal')">
  <div class="modal-panel">
    <div class="modal-header"><h3>Familie Bingo 🥚</h3><button class="modal-close" onclick="closeModal('bingoModal')">✕</button></div>
    <div id="bingoScore" style="font-size: 0.8rem; margin-bottom: 1rem; color: var(--stone-400);"></div>
    <div class="bingo-grid" id="bingoGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="wordSearchModal" onclick="if(event.target===this)closeModal('wordSearchModal')">
  <div class="modal-panel">
    <div class="modal-header"><h3>Paas Woordzoeker 🧩</h3><button class="modal-close" onclick="closeModal('wordSearchModal')">✕</button></div>
    <p style="font-size: 0.7rem; color: var(--stone-400); margin-bottom: 1rem;">Tik de letters aan om namen en woorden te vinden.</p>
    <div class="wordsearch-grid" id="wsGrid"></div>
    <div class="word-list" id="wsWords"></div>
  </div>
</div>

<div class="modal-overlay" id="weatherModal" onclick="if(event.target===this)closeModal('weatherModal')">
  <div class="modal-panel">
    <div class="modal-header"><h3>Weerbericht 🌤️</h3><button class="modal-close" onclick="closeModal('weatherModal')">✕</button></div>
    <div id="weatherDays" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;"></div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <img src="Rudi_Paasei_In_Mond.gif">
  <h2>BINGO! 🐣</h2>
  <button class="btn" onclick="localStorage.removeItem('bingo_pazen'); location.reload();">Reset</button>
</div>

<div class="win-overlay" id="wsWinOverlay">
  <img src="puzzelmaster.gif" alt="Puzzelmaster">
  <h2>PUZZELMASTER! 🏆</h2>
  <p>Je hebt alle familieleden en woorden gevonden!</p>
  <button class="btn" style="margin-top:1rem" onclick="location.reload();">Opnieuw Spelen</button>
</div>

<footer>SUMMIO EMSLANDERMEER • PASEN 2026</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyDM-7IhOf0gRKVDv8rCdvQrKkRKd6kP9-A", authDomain: "paas-planner.firebaseapp.com", projectId: "paas-planner", storageBucket: "paas-planner.firebasestorage.app", messagingSenderId: "423781486356", appId: "1:423781486356:web:99aa95df4a36b455b9bc01" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Geluiden
  const soundLike = new Audio('thomasdislike.mp3');
  const soundBingoCheck = new Audio('bingocheck.mp3');
  const soundBingoWin = new Audio('bingowin.mp3');
  const soundWordFound = new Audio('wordfound.mp3'); 

  // Data
  const WORDS = ["ANOUK", "RIK", "FAE", "SIEM", "ELINE", "MENZO", "BRAM", "TYGO", "PETRA", "HARRY", "RUDI", "LINDA", "THOMAS", "PAASONTBIJT", "PAASEI", "VLAGTWEDDE", "PAASHAAS", "JEZUS", "CHOCOLADE"];
  const BINGO_ITEMS = [{id:1, text:"Rudi zegt: 'Dit is het laatste jaar'"}, {id:2, text:"Te lang op de wc"}, {id:3, text:"Hitster fout gezongen"}, {id:4, text:"Harry slaapt op de bank"}, {id:5, text:"Knoeien bij ontbijt"}, {id:6, text:"Kind doet zich pijn"}, {id:7, text:"Stinkscheet"}, {id:8, text:"Rudi is aardig tegen Anouk"}, {id:9, text:"Paasverhaal uitleg"}];
  const ACTIVITIES = [
    { id: "1", title: "Dinopark Tenaxx", category: "attractie", distance: 10, image: "https://cdn.prod.website-files.com/65a283f223e7ba2a5cd2a7a4/66733caa7b50c394140e0fa1_Kinderen%20met%20trex.webp", url: "https://dinoparklandgoedtenaxx.nl" },
    { id: "2", title: "Sportsbar De Dribbel", category: "activiteit", distance: 1, image: "https://www.sportplazavlagtwedde.nl/dynamic/image/248d9fe116df64a804cfc1eabb862995a03c01a5b90005ef4915078bbb5ae4db/width=1200/height=450/image.webp", url: "https://www.sportplazavlagtwedde.nl" },
    { id: "5", title: "Vesting Bourtange", category: "bezienswaardigheid", distance: 10, image: "https://www.bungalowparkoverzicht.nl/app/uploads/2024/04/Vestingdorp-Bourtange.webp", url: "https://www.bourtange.nl" }
  ];

  let currentFilter = 'alle';
  let votesData = {};

  // --- WOORDZOEKER LOGICA ---
  let selectedCells = [];
  let foundWords = [];
  const gridSize = 12;
  let grid = Array(gridSize).fill().map(() => Array(gridSize).fill(''));

  function initWordSearch() {
    // Woorden plaatsen (simpel horizontaal/verticaal)
    WORDS.forEach(word => {
      let placed = false;
      while (!placed) {
        let dir = Math.random() > 0.5 ? 'H' : 'V';
        let r = Math.floor(Math.random() * gridSize);
        let c = Math.floor(Math.random() * gridSize);
        if (dir === 'H' && c + word.length <= gridSize) {
          let canPlace = true;
          for(let i=0; i<word.length; i++) if(grid[r][c+i] !== '' && grid[r][c+i] !== word[i]) canPlace = false;
          if(canPlace) {
            for(let i=0; i<word.length; i++) grid[r][c+i] = word[i];
            placed = true;
          }
        } else if (dir === 'V' && r + word.length <= gridSize) {
          let canPlace = true;
          for(let i=0; i<word.length; i++) if(grid[r+i][c] !== '' && grid[r+i][c] !== word[i]) canPlace = false;
          if(canPlace) {
            for(let i=0; i<word.length; i++) grid[r+i][c] = word[i];
            placed = true;
          }
        }
      }
    });
    // Opvullen
    for(let r=0; r<gridSize; r++) {
      for(let c=0; c<gridSize; c++) {
        if(grid[r][c] === '') grid[r][c] = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
      }
    }
    renderWS();
  }

  function renderWS() {
    const container = document.getElementById('wsGrid');
    container.innerHTML = '';
    grid.forEach((row, r) => row.forEach((letter, c) => {
      const cell = document.createElement('div');
      cell.className = 'ws-cell';
      cell.textContent = letter;
      cell.onclick = () => toggleCell(r, c, cell);
      container.appendChild(cell);
    }));
    document.getElementById('wsWords').innerHTML = WORDS.map(w => `<span class="word-item" id="list-${w}">${w}</span>`).join('');
  }

  function toggleCell(r, c, el) {
    const id = `${r}-${c}`;
    if(selectedCells.includes(id)) {
      selectedCells = selectedCells.filter(i => i !== id);
      el.classList.remove('selected');
    } else {
      selectedCells.push(id);
      el.classList.add('selected');
    }
    checkWS();
  }

  function checkWS() {
    const currentString = selectedCells.map(id => {
      const [r, c] = id.split('-');
      return grid[r][c];
    }).join('');

    WORDS.forEach(word => {
      if(currentString === word && !foundWords.includes(word)) {
        foundWords.push(word);
        soundWordFound.play();
        document.getElementById(`list-${word}`).classList.add('found');
        document.querySelectorAll('.ws-cell.selected').forEach(el => {
          el.classList.remove('selected');
          el.classList.add('found');
        });
        selectedCells = [];
        if(foundWords.length === WORDS.length) document.getElementById('wsWinOverlay').classList.add('visible');
      }
    });
  }

  // --- BINGO & ONDERSTEUNING ---
  window.openModal = (id) => {
    document.getElementById(id).classList.add('visible');
    if(id === 'wordSearchModal' && grid[0][0] === '') initWordSearch();
  };
  window.closeModal = (id) => document.getElementById(id).classList.remove('visible');

  window.toggleBingo = (id) => {
    let state = JSON.parse(localStorage.getItem('bingo_pazen') || '{}');
    state[id] = !state[id];
    localStorage.setItem('bingo_pazen', JSON.stringify(state));
    if(state[id]) { soundBingoCheck.play(); spawnEggs(); }
    renderBingo();
  };

  window.renderBingo = () => {
    let state = JSON.parse(localStorage.getItem('bingo_pazen') || '{}');
    const checked = BINGO_ITEMS.filter(i => state[i.id]).length;
    document.getElementById('bingoScore').textContent = `${checked} / 9 afgevinkt`;
    document.getElementById('bingoGrid').innerHTML = BINGO_ITEMS.map(i => `
      <div class="bingo-item ${state[i.id]?'checked':''}" onclick="toggleBingo(${i.id})">
        ${i.text} ${state[i.id]?'🥚':''}
      </div>`).join('');
    if(checked === 9) { soundBingoWin.play(); document.getElementById('winOverlay').classList.add('visible'); }
  };

  function spawnEggs() {
    for(let i=0; i<10; i++) {
      const egg = document.createElement('div');
      egg.className = 'falling-egg';
      egg.textContent = '🥚';
      egg.style.left = Math.random()*100+'vw';
      egg.style.animationDuration = (Math.random()*2+1)+'s';
      document.body.appendChild(egg);
      setTimeout(() => egg.remove(), 3000);
    }
  }

  // Firebase & Init
  onSnapshot(doc(db, "planner", "votes"), (s) => { if(s.exists()){ votesData = s.data(); renderActivities(); } });
  window.renderActivities = () => { /* Bestaande render logica */ };
  
  renderBingo();
  initWordSearch();
</script>
</body>
</html>
