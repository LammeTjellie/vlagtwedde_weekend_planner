<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Weekend Planner Vlagtwedde - Pasen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcf9;
      --stone-100: #f5f5f0;
      --stone-200: #e7e5e0;
      --stone-400: #a8a29e;
      --stone-500: #78716c;
      --stone-900: #1c1917;
      /* Paas Kleuren */
      --easter-pink: #fce7f3;
      --easter-yellow: #fef9c3;
      --easter-green: #dcfce7;
      --easter-accent: #fbbf24;
      --orange: #ea580c;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--stone-900);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    /* PAAS DECORATIE */
    .egg-bg {
      position: fixed;
      z-index: -1;
      opacity: 0.5;
      pointer-events: none;
    }

    /* HEADER */
    header {
      position: relative;
      overflow: hidden;
      padding: 4rem 1.5rem 3rem;
      border-bottom: 8px solid var(--easter-green);
      background: linear-gradient(to bottom, #fff, var(--easter-yellow));
    }

    .header-inner {
      max-width: 1024px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header-top {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (min-width: 768px) {
      .header-top { flex-direction: row; justify-content: space-between; align-items: flex-start; }
    }

    .header-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone-500);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1.1;
      color: var(--stone-900);
      font-style: italic;
    }

    h1 span {
      font-style: normal;
      font-family: 'DM Sans', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--orange);
      display: block;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 700;
      border: 1px solid var(--stone-200);
      background: white;
      color: var(--stone-900);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover { background: var(--stone-100); transform: translateY(-2px); }

    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .filter-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 700;
      border: 1px solid var(--stone-200);
      background: white;
      color: var(--stone-500);
      cursor: pointer;
    }

    .filter-btn.active { background: var(--stone-900); color: white; border-color: var(--stone-900); }

    /* MAIN */
    main { max-width: 1024px; margin: 0 auto; padding: 3rem 1.5rem; }

    /* ACTIVITIES GRID */
    .activities-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    @media (min-width: 640px) { .activities-grid { grid-template-columns: repeat(2, 1fr); } }

    .activity-card {
      background: white;
      border: 1px solid var(--stone-200);
      border-radius: 2rem;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .card-image-wrap { aspect-ratio: 16/10; overflow: hidden; position: relative; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 2rem; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; margin-bottom: 1rem; }

    /* MODAL STYLES (WEATHER & BINGO) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      background: rgba(28,25,23,0.4);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }

    .modal-panel {
      background: var(--stone-900);
      color: white;
      border-radius: 2.5rem;
      padding: 1.75rem;
      max-width: 450px;
      width: 100%;
      transform: translateY(30px);
      transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .modal-overlay.visible .modal-panel { transform: translateY(0); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-style: italic; }
    .modal-close {
      width: 2rem; height: 2rem; border-radius: 50%; background: #292524; border: none; color: #a8a29e; cursor: pointer;
    }

    /* WEATHER GRID (4 DAYS) */
    .weather-days { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .weather-day { background: #292524; border-radius: 1rem; padding: 0.75rem 0.4rem; text-align: center; }
    .weather-day .wd-name { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #a8a29e; margin-bottom: 0.4rem; }
    .weather-day .wd-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .weather-day .wd-temp { font-size: 0.9rem; font-weight: 900; }
    .weather-day.today { background: var(--orange); }

    /* BINGO SPECIFIC */
    .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .bingo-item {
      aspect-ratio: 1; background: #292524; border: 2px solid #3f3a36; border-radius: 1rem;
      padding: 0.5rem; font-size: 0.7rem; color: #d6d3d1; cursor: pointer;
      display: flex; align-items: center; justify-content: center; text-align: center;
      position: relative; overflow: hidden; transition: all 0.2s;
    }
    .bingo-item.checked { background: var(--easter-accent); color: var(--stone-900); border-color: var(--easter-accent); font-weight: 700; }
    .bingo-letter-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 0.5rem; }
    .bingo-letter { background: var(--orange); color: white; text-align: center; padding: 0.4rem; border-radius: 0.5rem; font-weight: 900; }

    /* FALLING EGG ANIMATION */
    .falling-egg {
      position: fixed;
      top: -50px;
      z-index: 999;
      font-size: 2rem;
      user-select: none;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* WEATHER BAR */
    .weather-bar {
      display: flex; align-items: center; gap: 0.5rem; background: white; border: 1px solid var(--stone-200);
      border-radius: 9999px; padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<svg class="egg-bg" style="top:10%; left:5%; width:100px" viewBox="0 0 200 260"><path fill="var(--easter-pink)" d="M100,0 C44.8,0 0,116.4 0,173.2 C0,221.1 44.8,260 100,260 C155.2,260 200,221.1 200,173.2 C200,116.4 155.2,0 100,0 Z"/></svg>
<svg class="egg-bg" style="bottom:10%; right:5%; width:80px" viewBox="0 0 200 260"><path fill="var(--easter-green)" d="M100,0 C44.8,0 0,116.4 0,173.2 C0,221.1 44.8,260 100,260 C155.2,260 200,221.1 200,173.2 C200,116.4 155.2,0 100,0 Z"/></svg>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">🐰 Paasweekend 2026</div>
        <h1>Vlagtwedde<br><span>Weekend Planner</span></h1>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="openModal('bingoModal')">
          <span style="font-size:1.2rem">🧺</span> Bingo
        </button>
        <button class="weather-bar" onclick="openModal('weatherModal')">
          <span id="wIcon">⛅</span> <span id="wTemp">--°</span>
        </button>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alles</button>
      <button class="filter-btn" onclick="setFilter('bezienswaardigheid', this)">Bezienswaardigheden</button>
      <button class="filter-btn" onclick="setFilter('activiteit', this)">Activiteiten</button>
    </div>
  </div>
</header>

<main>
  <div class="activities-grid" id="activitiesGrid"></div>
</main>

<div class="modal-overlay" id="bingoModal" onclick="if(event.target===this)closeModal('bingoModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Paas Bingo 🥚</div>
      <button class="modal-close" onclick="closeModal('bingoModal')">✕</button>
    </div>
    <div style="margin-bottom:1rem; font-size:0.8rem; color:var(--stone-400)" id="bingoScore">0 / 9 afgevinkt</div>
    <div class="bingo-letter-header">
      <div class="bingo-letter">B</div><div class="bingo-letter">I</div><div class="bingo-letter">N</div>
    </div>
    <div class="bingo-grid" id="bingoGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="weatherModal" onclick="if(event.target===this)closeModal('weatherModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Weer in Vlagtwedde</div>
      <button class="modal-close" onclick="closeModal('weatherModal')">✕</button>
    </div>
    <div class="weather-days" id="weatherDays">
      </div>
  </div>
</div>

<footer>
  <p>Summio Emslandermeer • Pasen 2026</p>
</footer>

<script>
  // DATA (Originele teksten behouden)
  const ACTIVITIES = [
    { id: "1", title: "Dinopark Landgoed Tenaxx", description: "Dinosaurussen op ware grootte en een dinomuseum.", category: "activiteit", distance: 10, image: "https://cdn.prod.website-files.com/65a283f223e7ba2a5cd2a7a4/66733caa7b50c394140e0fa1_Kinderen%20met%20trex.webp" },
    { id: "5", title: "Vestingdorp Bourtange", description: "Uniek historisch verdedigingswerk.", category: "bezienswaardigheid", distance: 10, image: "https://www.bungalowparkoverzicht.nl/app/uploads/2024/04/Vestingdorp-Bourtange.webp" },
    { id: "4", title: "Wildlands Emmen", description: "Drie werelden: Jungola, Serenga en Nortica.", category: "activiteit", distance: 30, image: "https://www.wildlands.nl/image.php?file=/uploads/Wildlands_safari_neushoorns_1280x720_17623.jpg&width=1280" }
  ];

  const BINGO_ITEMS = [
    { id: 1, text: "Rudi zegt: 'Dit is het laatste jaar dat ik mee ga'" },
    { id: 2, text: "Iemand klaagt dat een ander te lang op de wc zit" },
    { id: 3, text: "Er wordt een stinkscheet gelaten" },
    { id: 4, text: "Harry doet even z'n ogen dicht op de bank" },
    { id: 5, text: "Anouk zakt door een stoel" },
    { id: 6, text: "Er valt een kind uit bed" },
    { id: 7, text: "Zoektocht naar het gouden ei" },
    { id: 8, text: "Iemand morst advocaat" },
    { id: 9, text: "Paasontbijt duurt langer dan 2 uur" }
  ];

  let bingoState = JSON.parse(localStorage.getItem('bingoState') || '{}');
  let currentFilter = 'alle';

  function renderActivities() {
    const grid = document.getElementById('activitiesGrid');
    const filtered = ACTIVITIES.filter(a => currentFilter === 'alle' || a.category === currentFilter);
    grid.innerHTML = filtered.map(a => `
      <div class="activity-card">
        <div class="card-image-wrap"><img src="${a.image}"></div>
        <div class="card-body">
          <h3 class="card-title">${a.title}</h3>
          <p style="color:var(--stone-500); font-size:0.9rem">${a.description}</p>
        </div>
      </div>
    `).join('');
  }

  function renderBingo() {
    const grid = document.getElementById('bingoGrid');
    const checkedCount = BINGO_ITEMS.filter(i => bingoState[i.id]).length;
    document.getElementById('bingoScore').textContent = `${checkedCount} / 9 afgevinkt`;
    
    grid.innerHTML = BINGO_ITEMS.map(item => `
      <div class="bingo-item ${bingoState[item.id] ? 'checked' : ''}" onclick="toggleBingoItem(${item.id})">
        ${item.text}
      </div>
    `).join('');
  }

  function toggleBingoItem(id) {
    bingoState[id] = !bingoState[id];
    localStorage.setItem('bingoState', JSON.stringify(bingoState));
    renderBingo();
    if(bingoState[id]) spawnEggs();
  }

  function spawnEggs() {
    const emojis = ['🥚', '🐣', '🌸', '🐰'];
    for(let i=0; i<15; i++) {
      const egg = document.createElement('div');
      egg.className = 'falling-egg';
      egg.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      egg.style.left = Math.random() * 100 + 'vw';
      egg.style.animationDuration = (Math.random() * 2 + 1) + 's';
      document.body.appendChild(egg);
      setTimeout(() => egg.remove(), 3000);
    }
  }

  function openModal(id) { 
    document.getElementById(id).classList.add('visible'); 
    if(id === 'weatherModal') fetchWeather();
  }
  function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

  async function fetchWeather() {
    const WMO = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 61:'🌧️', 80:'🌦️' };
    const DAYS_NL = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
    try {
      // Forecast days op 4 gezet
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.87&longitude=7.07&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FAmsterdam&forecast_days=4');
      const data = await res.json();
      
      document.getElementById('wIcon').textContent = WMO[data.current.weathercode] || '⛅';
      document.getElementById('wTemp').textContent = Math.round(data.current.temperature_2m) + '°';

      const daysGrid = document.getElementById('weatherDays');
      daysGrid.innerHTML = data.daily.time.map((time, i) => {
        const d = new Date(time);
        return `
          <div class="weather-day ${i===0?'today':''}">
            <div class="wd-name">${i===0?'Nu':DAYS_NL[d.getDay()]}</div>
            <div class="wd-icon">${WMO[data.daily.weathercode[i]] || '⛅'}</div>
            <div class="wd-temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
          </div>
        `;
      }).join('');
    } catch(e) { console.log("Weer kon niet laden"); }
  }

  function setFilter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderActivities();
  }

  // Init
  renderActivities();
  renderBingo();
  fetchWeather();
</script>

</body>
</html>
