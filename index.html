<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Weekend Planner Vlagtwedde - Pasen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfcf9;
      --stone-100: #f5f5f0;
      --stone-200: #e7e5e0;
      --stone-400: #a8a29e;
      --stone-500: #78716c;
      --stone-900: #1c1917;
      --orange: #ea580c;
      /* Paas Kleuren */
      --easter-pink: #fce7f3;
      --easter-yellow: #fef9c3;
      --easter-green: #dcfce7;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--stone-900);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER UPGRADE */
    header {
      position: relative;
      overflow: hidden;
      padding: 4rem 1.5rem 3rem;
      border-bottom: 6px solid var(--easter-green);
      background: linear-gradient(to bottom, #fff, var(--easter-yellow));
    }

    .header-inner {
      max-width: 1024px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header-top {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (min-width: 768px) {
      .header-top { flex-direction: row; justify-content: space-between; align-items: flex-start; }
    }

    .header-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone-500);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1.1;
      color: var(--stone-900);
      font-style: italic;
    }

    h1 span {
      font-style: normal;
      font-family: 'DM Sans', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--orange);
      display: block;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 700;
      border: 1px solid var(--stone-200);
      background: white;
      color: var(--stone-900);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover { background: var(--stone-100); transform: translateY(-1px); }
    .btn-active { background: var(--orange) !important; border-color: var(--orange) !important; color: white !important; }
    .btn svg { width: 1rem; height: 1rem; }

    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .filter-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 700;
      border: 1px solid var(--stone-200);
      background: white;
      color: var(--stone-500);
      cursor: pointer;
      transition: all 0.3s;
    }

    .filter-btn.active { background: var(--stone-900); border-color: var(--stone-900); color: white; }

    /* MAIN */
    main { max-width: 1024px; margin: 0 auto; padding: 3rem 1.5rem; }

    /* BINGO UPGRADE */
    .bingo-section { margin-bottom: 3rem; }
    .bingo-section.hidden { display: none; }
    .bingo-card {
      background: var(--stone-900);
      color: white;
      padding: 2rem;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    .bingo-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;
    }

    .bingo-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; }
    .bingo-score { background: var(--orange); padding: 0.4rem 0.9rem; border-radius: 9999px; font-weight: 900; font-size: 0.8rem; }

    /* B-I-N-G-O Fix */
    .bingo-letters {
      display: flex; justify-content: space-around;
      background: var(--orange); color: white;
      border-radius: 1rem; padding: 0.5rem; margin-bottom: 0.75rem;
      font-weight: 900; font-size: 1.5rem; letter-spacing: 0.5rem;
    }

    .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .bingo-item {
      aspect-ratio: 1; padding: 0.75rem; border-radius: 1rem;
      background: #292524; border: 2px solid #3f3a36; color: #d6d3d1;
      font-size: 0.75rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; text-align: center;
      transition: all 0.2s; position: relative;
    }
    .bingo-item.checked { background: var(--orange); color: white; border-color: var(--orange); }
    .bingo-item.checked .bingo-text { opacity: 0.3; }
    .bingo-check { position: absolute; font-size: 2.5rem; display: none; }
    .bingo-item.checked .bingo-check { display: block; }

    /* ANIMATIE: FALLING EGGS */
    .falling-egg {
      position: fixed; top: -50px; z-index: 999;
      font-size: 2rem; pointer-events: none;
      animation: fall linear forwards;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

    /* FULL CARD OVERLAY */
    .win-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; display: none; flex-direction: column;
      align-items: center; justify-content: center; color: white; text-align: center; padding: 2rem;
    }
    .win-overlay.visible { display: flex; }
    .win-image-placeholder {
      width: 300px; height: 300px; background: var(--stone-500);
      border: 4px dashed var(--easter-yellow); border-radius: 2rem;
      display: flex; align-items: center; justify-content: center; margin-bottom: 2rem;
    }

    /* ACTIVITIES */
    .activities-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 640px) { .activities-grid { grid-template-columns: repeat(2, 1fr); } }

    .activity-card { background: white; border: 1px solid var(--stone-200); border-radius: 2rem; overflow: hidden; animation: fadeUp 0.5s ease both; }
    .card-image-wrap { aspect-ratio: 16/10; overflow: hidden; position: relative; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 2rem; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; margin-bottom: 1rem; }
    
    .badge { padding: 0.2rem 0.75rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border: 1px solid; }
    .badge-bezienswaardigheid { background: #d1fae5; color: #065f46; }
    .badge-attractie { background: #dbeafe; color: #1e40af; }
    .badge-activiteit { background: #fff7ed; color: #9a3412; }
    .badge-idee { background: #f3e8ff; color: #6b21a8; }

    /* WEATHER MODAL (Originele stijl behouden) */
    .weather-bar { display: flex; align-items: center; gap: 0.75rem; background: white; border: 1px solid var(--stone-200); border-radius: 9999px; padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
    .weather-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 1rem; background: rgba(28,25,23,0.4); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .weather-modal.visible { opacity: 1; pointer-events: auto; }
    .weather-panel { background: var(--stone-900); color: white; border-radius: 2rem; padding: 1.75rem; max-width: 420px; width: 100%; transform: translateY(30px); transition: transform 0.3s; }
    .weather-modal.visible .weather-panel { transform: translateY(0); }
    .weather-days { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .weather-day { background: #292524; border-radius: 1rem; padding: 1rem 0.5rem; text-align: center; }
    .weather-day.today { background: var(--orange); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    footer { text-align: center; padding: 4rem 1.5rem; color: var(--stone-400); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">🐰 Paasweekend 2026</div>
        <h1>Vlagtwedde<br><span>Weekend Planner</span></h1>
      </div>
      <div class="header-actions">
        <button class="btn" id="bingoToggle" onclick="toggleBingoSection()">
          <span style="font-size:1.2rem">🧺</span> Bingo
        </button>
        <button class="weather-bar" onclick="openWeather()">
          <span id="wIcon">⛅</span> <span id="wTemp">--°</span> <span>Vlagtwedde</span>
        </button>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alles</button>
      <button class="filter-btn" onclick="setFilter('bezienswaardigheid', this)">Bezienswaardigheid</button>
      <button class="filter-btn" onclick="setFilter('attractie', this)">Attractie</button>
      <button class="filter-btn" onclick="setFilter('activiteit', this)">Activiteit</button>
    </div>
  </div>
</header>

<main>
  <div class="bingo-section hidden" id="bingoSection">
    <div class="bingo-card">
      <div class="bingo-header">
        <div>
          <div class="bingo-title">Familie Weekend Bingo 🥚</div>
          <div style="color:#a8a29e; font-size:0.8rem">Wie heeft als eerste de kaart vol?</div>
        </div>
        <div class="bingo-score" id="bingoScore">0 / 9</div>
      </div>
      <div class="bingo-letters">B I N G O</div>
      <div class="bingo-grid" id="bingoGrid"></div>
    </div>
  </div>

  <div class="activities-grid" id="activitiesGrid"></div>
</main>

<div class="win-overlay" id="winOverlay">
  <div class="win-image-placeholder">
    <p style="color:white; font-weight:900">JOUW AFBEELDING / GIF HIER</p>
  </div>
  <h2 style="font-family:'Playfair Display'; font-size:2rem; font-style:italic">GEFELICITEERD! 🐣</h2>
  <p style="margin:1rem 0 2rem">De kaart is helemaal vol!</p>
  <button class="btn" onclick="document.getElementById('winOverlay').classList.remove('visible')">Sluiten</button>
</div>

<div class="weather-modal" id="weatherModal" onclick="if(event.target===this)closeWeather()">
  <div class="weather-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem">
      <h3 class="bingo-title">Weer in Vlagtwedde 🌤️</h3>
      <button style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer" onclick="closeWeather()">✕</button>
    </div>
    <div class="weather-days" id="weatherDays"></div>
  </div>
</div>

<footer>
  SUMMIO EMSLANDERMEER • PASEN 2026 • VLAGTWEDDE
</footer>

<script>
  const ACTIVITIES = [
    { id: "1", title: "Dinopark Landgoed Tenaxx", description: "Dinosaurussen op ware grootte en een dinomuseum.", category: "attractie", distance: 10, image: "https://cdn.prod.website-files.com/65a283f223e7ba2a5cd2a7a4/66733caa7b50c394140e0fa1_Kinderen%20met%20trex.webp" },
    { id: "2", title: "Sportsbar De Dribbel", description: "Gezellige sportsbar in Vlagtwedde.", category: "activiteit", distance: 1, image: "https://www.sportplazavlagtwedde.nl/dynamic/image/248d9fe116df64a804cfc1eabb862995a03c01a5b90005ef4915078bbb5ae4db/width=1200/height=450/image.webp" },
    { id: "4", title: "Wildlands Dierentuin Emmen", description: "Een uniek avonturenpark met drie verschillende werelden.", category: "attractie", distance: 30, image: "https://www.wildlands.nl/image.php?file=/uploads/Wildlands_safari_neushoorns_1280x720_17623.jpg&width=1280" },
    { id: "5", title: "Vestingdorp Bourtange", description: "Een uniek historisch verdedigingswerk.", category: "bezienswaardigheid", distance: 10, image: "https://www.bungalowparkoverzicht.nl/app/uploads/2024/04/Vestingdorp-Bourtange.webp" }
  ];

  const BINGO_ITEMS = [
    { id: 1, text: "Rudi zegt: 'Dit is het laatste jaar dat ik mee ga'" },
    { id: 2, text: "Iemand klaagt dat een ander te lang op de wc zit" },
    { id: 3, text: "Er wordt een stinkscheet gelaten" },
    { id: 4, text: "Harry doet even z'n ogen dicht op de bank" },
    { id: 5, text: "Anouk zakt door een stoel" },
    { id: 6, text: "Er valt een kind uit bed" },
    { id: 7, text: "🎯 Nog te bedenken..." },
    { id: 8, text: "🎯 Nog te bedenken..." },
    { id: 9, text: "🎯 Nog te bedenken..." }
  ];

  let bingoState = JSON.parse(localStorage.getItem('bingo_vlagtwedde') || '{}');
  let currentFilter = 'alle';

  function renderActivities() {
    const grid = document.getElementById('activitiesGrid');
    const items = currentFilter === 'alle' ? ACTIVITIES : ACTIVITIES.filter(a => a.category === currentFilter);
    grid.innerHTML = items.map(a => `
      <div class="activity-card">
        <div class="card-image-wrap">
          <img src="${a.image}">
          <div style="position:absolute; top:1rem; left:1rem">
            <span class="badge badge-${a.category}">${a.category}</span>
          </div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${a.title}</h3>
          <p style="color:var(--stone-500); font-size:0.875rem">${a.description}</p>
        </div>
      </div>
    `).join('');
  }

  function renderBingo() {
    const grid = document.getElementById('bingoGrid');
    const checkedCount = BINGO_ITEMS.filter(i => bingoState[i.id]).length;
    document.getElementById('bingoScore').textContent = `${checkedCount} / 9`;
    
    grid.innerHTML = BINGO_ITEMS.map(item => `
      <div class="bingo-item ${bingoState[item.id] ? 'checked' : ''}" onclick="toggleBingoItem(${item.id})">
        <span class="bingo-text">${item.text}</span>
        <span class="bingo-check">✔️</span>
      </div>
    `).join('');

    if (checkedCount === 9) {
      document.getElementById('winOverlay').classList.add('visible');
    }
  }

  function toggleBingoItem(id) {
    bingoState[id] = !bingoState[id];
    localStorage.setItem('bingo_vlagtwedde', JSON.stringify(bingoState));
    if(bingoState[id]) spawnEggs();
    renderBingo();
  }

  function spawnEggs() {
    const emojis = ['🥚', '🐣', '🌸', '🐰', '🍫'];
    for(let i=0; i<15; i++) {
      const egg = document.createElement('div');
      egg.className = 'falling-egg';
      egg.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      egg.style.left = Math.random() * 100 + 'vw';
      egg.style.animationDuration = (Math.random() * 2 + 1) + 's';
      document.body.appendChild(egg);
      setTimeout(() => egg.remove(), 3000);
    }
  }

  function toggleBingoSection() {
    const s = document.getElementById('bingoSection');
    const b = document.getElementById('bingoToggle');
    s.classList.toggle('hidden');
    b.classList.toggle('btn-active');
  }

  function setFilter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderActivities();
  }

  // WEATHER API (Echt uit Vlagtwedde!)
  async function fetchWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.87&longitude=7.07&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FAmsterdam&forecast_days=3');
      const data = await res.json();
      const WMO = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 61:'🌧️', 80:'🌦️' };
      
      document.getElementById('wIcon').textContent = WMO[data.current.weathercode] || '🌡️';
      document.getElementById('wTemp').textContent = Math.round(data.current.temperature_2m) + '°';

      const daysNL = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
      document.getElementById('weatherDays').innerHTML = data.daily.time.map((t, i) => `
        <div class="weather-day ${i===0?'today':''}">
          <div style="font-size:0.7rem; font-weight:800; color:#a8a29e; margin-bottom:0.5rem">${i===0?'VANDAAG':daysNL[new Date(t).getDay()]}</div>
          <div style="font-size:2rem; margin-bottom:0.5rem">${WMO[data.daily.weathercode[i]] || '⛅'}</div>
          <div style="font-weight:900">${Math.round(data.daily.temperature_2m_max[i])}°</div>
        </div>
      `).join('');
    } catch(e) { console.error("Weer data kon niet worden geladen."); }
  }

  function openWeather() { document.getElementById('weatherModal').classList.add('visible'); }
  function closeWeather() { document.getElementById('weatherModal').classList.remove('visible'); }

  // Init
  renderActivities();
  renderBingo();
  fetchWeather();
</script>

</body>
</html>
