<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Weekend Planner Vlagtwedde - Pasen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fdfcf9; --stone-100: #f5f5f0; --stone-200: #e7e5e0; --stone-400: #a8a29e; --stone-500: #78716c; --stone-900: #1c1917; --orange: #ea580c; --easter-pink: #fce7f3; --easter-yellow: #fef9c3; --easter-green: #dcfce7; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--bg); color: var(--stone-900); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    header { position: relative; overflow: hidden; padding: 4rem 1.5rem 3rem; border-bottom: 6px solid var(--easter-green); background: linear-gradient(to bottom, #fff, var(--easter-yellow)); }
    .header-inner { max-width: 1024px; margin: 0 auto; position: relative; z-index: 1; }
    .header-top { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
    @media (min-width: 768px) { .header-top { flex-direction: row; justify-content: space-between; align-items: flex-start; } }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1.1; font-style: italic; }
    h1 span { font-style: normal; font-family: 'DM Sans', sans-serif; font-weight: 900; text-transform: uppercase; color: var(--orange); display: block; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; color: var(--stone-900); cursor: pointer; text-decoration: none; }
    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 2rem; }
    .filter-btn { padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; cursor: pointer; }
    .filter-btn.active { background: var(--stone-900); color: white; }
    main { max-width: 1024px; margin: 0 auto; padding: 3rem 1.5rem; }
    .activities-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 640px) { .activities-grid { grid-template-columns: repeat(2, 1fr); } }
    .activity-card { background: white; border: 1px solid var(--stone-200); border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; }
    .card-image-wrap { aspect-ratio: 16/10; overflow: hidden; position: relative; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-badge-top { position: absolute; top: 1rem; left: 1rem; }
    .badge { padding: 0.2rem 0.75rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border: 1px solid; }
    .badge-bezienswaardigheid { background: #d1fae5; color: #065f46; border-color: #a7f3d0; }
    .badge-attractie { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
    .badge-activiteit { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    .badge-idee { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
    .card-badge-bottom { position: absolute; bottom: 1rem; left: 1rem; display: flex; gap: 0.5rem; }
    .meta-pill { background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); padding: 0.35rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
    .card-body { padding: 2rem; flex-grow: 1; display: flex; flex-direction: column; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; margin-bottom: 1rem; }
    
    /* LIKE & DISLIKE STYLES */
    .voting-wrap { display: flex; gap: 0.75rem; margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--stone-100); }
    .vote-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 9999px; border: 1px solid var(--stone-200); background: white; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.2s; }
    .vote-btn.active-up { background: #dcfce7; border-color: #4ade80; color: #166534; }
    .vote-btn.active-down { background: #fee2e2; border-color: #f87171; color: #991b1b; }
    .vote-count { font-variant-numeric: tabular-nums; }

    .modal-overlay { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-end; justify-content: center; padding: 1rem; background: rgba(28,25,23,0.4); backdrop-filter: blur(4px); }
    .modal-overlay.visible { display: flex; }
    .modal-panel { background: var(--stone-900); color: white; border-radius: 2.5rem; padding: 1.75rem; max-width: 420px; width: 100%; }
    .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .bingo-item { aspect-ratio: 1; padding: 0.5rem; border-radius: 1rem; background: #292524; color: #d6d3d1; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; }
    .bingo-item.checked { background: var(--orange); color: white; }
    .win-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
    .win-overlay.visible { display: flex; }
    .win-overlay img { width: 280px; border-radius: 2rem; margin-bottom: 2rem; border: 3px solid var(--orange); }
    footer { text-align: center; padding: 3rem 1.5rem; color: var(--stone-400); font-size: 0.7rem; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div><div class="header-eyebrow">🐰 Paasweekend 2026</div><h1>Vlagtwedde<br><span>Weekend Planner</span></h1></div>
      <div class="header-actions">
        <button class="btn" onclick="openModal('bingoModal')">🧺 Bingo</button>
        <button class="btn" onclick="openModal('weatherModal')"><span id="wIcon">⛅</span> <span id="wTemp">--°</span></button>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alles</button>
      <button class="filter-btn" onclick="setFilter('bezienswaardigheid', this)">Bezienswaardigheid</button>
      <button class="filter-btn" onclick="setFilter('attractie', this)">Attractie</button>
      <button class="filter-btn" onclick="setFilter('activiteit', this)">Activiteit</button>
      <button class="filter-btn" onclick="setFilter('idee', this)">Idee</button>
    </div>
  </div>
</header>

<main>
  <div class="activities-grid" id="activitiesGrid"></div>
</main>

<div class="modal-overlay" id="bingoModal" onclick="if(event.target===this)closeModal('bingoModal')">
  <div class="modal-panel">
    <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:1rem">
      <div style="font-family:Playfair Display; font-style:italic">Familie Bingo 🥚</div>
      <button onclick="closeModal('bingoModal')" style="background:none; border:none; color:white; cursor:pointer">✕</button>
    </div>
    <div style="margin-bottom:1rem; font-size:0.8rem; color:var(--stone-400)" id="bingoScore">0 / 9 afgevinkt</div>
    <div class="bingo-grid" id="bingoGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="weatherModal" onclick="if(event.target===this)closeModal('weatherModal')">
  <div class="modal-panel"><div id="weatherDays" style="display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem"></div></div>
</div>

<div class="win-overlay" id="winOverlay">
  <img src="Rudi_Paasei_In_Mond.gif" alt="Bingo Winnaar">
  <h2 style="font-family:Playfair Display; font-size:2rem; font-style:italic">BINGO! 🐣</h2>
  <button class="btn" onclick="document.getElementById('winOverlay').classList.remove('visible')" style="margin-top:2rem">Tof!</button>
</div>

<footer>SUMMIO EMSLANDERMEER • PASEN 2026</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // --- STAP 3: VUL HIER JOUW FIREBASE CONFIG IN ---
  const firebaseConfig = {
    apiKey: "AIzaSyDM-7IhOf0gRKVDv8rCdvQrKkRKd6kP9-A",
    authDomain: "paas-planner.firebaseapp.com",
    projectId: "paas-planner",
    storageBucket: "paas-planner.firebasestorage.app",
    messagingSenderId: "423781486356",
    appId: "1:423781486356:web:99aa95df4a36b455b9bc01"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ACTIVITIES = [
    { id: "1", title: "Dinopark Landgoed Tenaxx", category: "attractie", distance: 10, image: "https://cdn.prod.website-files.com/65a283f223e7ba2a5cd2a7a4/66733caa7b50c394140e0fa1_Kinderen%20met%20trex.webp", url: "https://dinoparklandgoedtenaxx.nl", desc: "Dinos op ware grootte." },
    { id: "2", title: "Sportsbar De Dribbel", category: "activiteit", distance: 1, image: "https://www.sportplazavlagtwedde.nl/dynamic/image/248d9fe116df64a804cfc1eabb862995a03c01a5b90005ef4915078bbb5ae4db/width=1200/height=450/image.webp", url: "https://www.sportplazavlagtwedde.nl", desc: "Gezellig drankje doen." },
    { id: "3", title: "Winkelcentrum de Weiert", category: "idee", distance: 30, image: "https://winkelcentrumdeweiert.nl/wp-content/uploads/2021/07/winkelcentrum-emmen-16.06.40-1.png", url: "https://winkelcentrumdeweiert.nl", desc: "Dagje shoppen in Emmen." },
    { id: "4", title: "Wildlands Dierentuin Emmen", category: "attractie", distance: 30, image: "https://images.tripper.nl/wildlands-adventure-zoo-ticket-korting/a558c7.jpg?auto=format&auto=enhance&q=100", url: "https://www.wildlands.nl", desc: "Drie unieke werelden." },
    { id: "5", title: "Vestingdorp Bourtange", category: "bezienswaardigheid", distance: 10, image: "https://www.bungalowparkoverzicht.nl/app/uploads/2024/04/Vestingdorp-Bourtange.webp", url: "https://www.bourtange.nl", desc: "Historisch verdedigingswerk." },
    { id: "6", title: "Natuurgebied Liefstinghsbroek", category: "bezienswaardigheid", distance: 2, image: "https://www.hetliefstinghsbroek.nl/fileadmin/user_upload/het-liefstinghsbroek/header-liefstinghsbroek.png", url: "https://www.staatsbosbeheer.nl/natuurgebieden/westerwolde", desc: "Prachtig oud bosgebied." },
    { id: "7", title: "Hunebedcentrum Borger", category: "bezienswaardigheid", distance: 32, image: "https://www.hunebedcentrum.eu/wp-content/uploads/2021/05/hunebed-header2-1536x518.png", url: "https://www.hunebedcentrum.eu", desc: "Grootste hunebed van NL." }
  ];

  let currentFilter = 'alle';
  let votesData = {};

  // Luister naar live database updates
  onSnapshot(doc(db, "planner", "votes"), (doc) => {
    if (doc.exists()) {
      votesData = doc.data();
      renderActivities();
    } else {
      // Maak het document aan als het nog niet bestaat
      setDoc(doc(db, "planner", "votes"), {});
    }
  });

  window.handleVote = async (id, type) => {
    const userKey = `voted_${id}`;
    if (localStorage.getItem(userKey)) return alert("Je hebt al gestemd op dit item!");

    const voteDoc = doc(db, "planner", "votes");
    await updateDoc(voteDoc, {
      [`${id}_${type}`]: increment(1)
    });
    localStorage.setItem(userKey, type);
    renderActivities();
  };

  function renderActivities() {
    const grid = document.getElementById('activitiesGrid');
    let items = currentFilter === 'alle' ? [...ACTIVITIES] : ACTIVITIES.filter(a => a.category === currentFilter);
    items.sort((a, b) => a.distance - b.distance);

    grid.innerHTML = items.map(a => {
      const up = votesData[`${a.id}_up`] || 0;
      const down = votesData[`${a.id}_down`] || 0;
      const myVote = localStorage.getItem(`voted_${a.id}`);

      return `
      <div class="activity-card">
        <div class="card-image-wrap">
          <img src="${a.image}">
          <div class="card-badge-top"><span class="badge badge-${a.category}">${a.category}</span></div>
          <div class="card-badge-bottom">
            <div class="meta-pill" onclick="window.openMaps('${a.title}')">📍 ${a.distance} km</div>
          </div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${a.title}</h3>
          <p style="font-size:0.8rem; color:var(--stone-500); margin-bottom:1rem">${a.desc}</p>
          <a href="${a.url}" target="_blank" class="btn" style="background:var(--stone-900); color:white; justify-content:center; margin-bottom:1rem">Bezoek website</a>
          
          <div class="voting-wrap">
            <button class="vote-btn ${myVote==='up'?'active-up':''}" onclick="handleVote('${a.id}', 'up')">
              👍 <span class="vote-count">${up}</span>
            </button>
            <button class="vote-btn ${myVote==='down'?'active-down':''}" onclick="handleVote('${a.id}', 'down')">
              👎 <span class="vote-count">${down}</span>
            </button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Bingo & Overige functies toegankelijk maken voor HTML
  window.openMaps = (title) => window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(title + ' Vlagtwedde')}`, '_blank');
  window.setFilter = (cat, btn) => {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderActivities();
  };
  
  // Bingo Logica (Lokaal)
  let bingoState = JSON.parse(localStorage.getItem('bingo_pazen') || '{}');
  window.toggleBingo = (id) => {
    bingoState[id] = !bingoState[id];
    localStorage.setItem('bingo_pazen', JSON.stringify(bingoState));
    renderBingo();
  };
  function renderBingo() {
    const items = ["Rudi zegt: 'Laatste jaar'", "Wc bezet klacht", "Stinkscheet", "Harry slaapt op bank", "Anouk zakt door stoel", "Kind valt uit bed", "🎯 Item 7", "🎯 Item 8", "🎯 Item 9"];
    const grid = document.getElementById('bingoGrid');
    grid.innerHTML = items.map((t, i) => `<div class="bingo-item ${bingoState[i]?'checked':''}" onclick="toggleBingo(${i})">${t}</div>`).join('');
    if(Object.values(bingoState).filter(v=>v).length === 9) document.getElementById('winOverlay').classList.add('visible');
  }

  window.openModal = (id) => document.getElementById(id).classList.add('visible');
  window.closeModal = (id) => document.getElementById(id).classList.remove('visible');

  renderActivities();
  renderBingo();
</script>
</body>
</html>
