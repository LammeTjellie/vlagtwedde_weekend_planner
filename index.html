<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Paas Planner V2</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@1,800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f8f9fa;
      --accent: #ea580c; /* Het oranje */
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #71717a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      background: var(--bg); 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      color: var(--text-main);
      margin: 0;
      padding-bottom: 100px; /* Ruimte voor menu */
    }

    /* --- MODERN HEADER --- */
    header {
      padding: calc(env(safe-area-inset-top) + 1.5rem) 1.5rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand h1 { 
      font-family: 'Playfair Display', serif; 
      font-size: 1.5rem; 
      margin: 0; 
      font-style: italic; 
    }

    .install-pill {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 0.8rem;
      display: none;
    }
    .install-pill.visible { display: block; }

    /* --- ACTIVITY CARDS --- */
    main { padding: 0 1rem; }
    
    .activities-grid {
      display: grid;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      position: relative;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    .card-badges {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .badge {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(5px);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 800;
    }

    .card-content { padding: 1.5rem; }
    .card-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; }
    .card-info { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.visible { display: flex; }

    .modal-panel {
      background: #1c1917; /* Lekker donker zoals in je vorige versie */
      color: white;
      width: 100%;
      max-width: 500px;
      border-radius: 2.5rem;
      padding: 2rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    /* --- BOTTOM NAV MENU --- */
    .bottom-nav {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 2.5rem;
      display: flex;
      justify-content: space-around;
      padding: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .nav-item {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 10px;
      transition: transform 0.2s;
    }
    .nav-item:active { transform: scale(0.8); }

    /* --- FILTER OVERLAY --- */
    .filter-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
      display: none;
      align-items: flex-end;
    }
    .filter-overlay.visible { display: flex; }

    .filter-panel {
      background: white;
      width: 100%;
      border-radius: 2rem 2rem 0 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .filter-option {
      padding: 1rem;
      border-radius: 1rem;
      border: 1px solid #eee;
      background: #f9f9f9;
      font-weight: 600;
      text-align: center;
    }
    .filter-option.active { background: var(--accent); color: white; }

    /* Bestaande Modals overnemen van V1 (Woordzoeker/Bingo/Weer) */
    /* ... (Kopieer hier je .modal-overlay en .modal-panel styles) ... */
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Paas Planner</h1>
  </div>
  <button id="pwaInstallBtn" class="install-pill">Installeer</button>
</header>

<main>
  <div id="activitiesGrid" class="activities-grid">
    </div>
</main>

<div class="modal-overlay" id="wsModal" onclick="if(event.target===this)closeModal('wsModal')">
  <div class="modal-panel" style="max-width: 500px;">
    <div class="modal-header">
      <div class="modal-title">Paas Woordzoeker 🧩</div>
      <button class="modal-close" onclick="closeModal('wsModal')">✕</button>
    </div>
    <p style="font-size:0.7rem; color:var(--stone-400); margin-bottom:1rem; text-align:center;">Sleep over de letters om woorden te vinden.</p>
    <div class="ws-grid" id="wsGrid"></div>
    <div class="ws-words" id="wsWords"></div>
  </div>
</div>

<div class="modal-overlay" id="bingoModal" onclick="if(event.target===this)closeModal('bingoModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Familie Bingo 🥚</div>
      <button class="modal-close" onclick="closeModal('bingoModal')">✕</button>
    </div>
    <div style="margin-bottom:1rem; font-size:0.8rem; color:var(--stone-400)" id="bingoScore">0 / 9 afgevinkt</div>
    <div class="bingo-letters"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
    <div class="bingo-grid" id="bingoGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="weatherModal" onclick="if(event.target===this)closeModal('weatherModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Weerbericht 🌤️</div>
      <button class="modal-close" onclick="closeModal('weatherModal')">✕</button>
    </div>
    <div class="weather-days" id="weatherDays"></div>
  </div>
</div>
  
<nav class="bottom-nav">
  <button class="nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏠</button>
  <button class="nav-item" onclick="openModal('bingoModal')">🧺</button>
  <button class="nav-item" onclick="openModal('wsModal')">🧩</button>
  <button class="nav-item" onclick="openModal('weatherModal')">⛅</button>
  <button class="nav-item" onclick="toggleFilters()">🔘</button>
</nav>

<div id="filterOverlay" class="filter-overlay" onclick="toggleFilters()">
  <div class="filter-panel" onclick="event.stopPropagation()">
    <h3 style="text-align:center; margin-bottom:1rem;">Filters</h3>
    <div id="filtersContainer" style="display:grid; gap:0.5rem;">
      </div>
    <button onclick="toggleFilters()" style="margin-top:1rem; padding:1rem; border:none; border-radius:1rem; background:#eee; font-weight:bold;">Sluiten</button>
  </div>
</div>

<script>
  // 1. DATA
  const ACTIVITIES = [
    { id: "1", title: "Dinopark Landgoed Tenaxx", description: "Een park vol met dinosaurussen op ware grootte, een dinomuseum en binnenspeeltuin.", category: "attractie", distance: 10, image: "https://cdn.prod.website-files.com/65a283f223e7ba2a5cd2a7a4/66733caa7b50c394140e0fa1_Kinderen%20met%20trex.webp", url: "https://dinoparklandgoedtenaxx.nl" },
    { id: "2", title: "Sportsbar De Dribbel", description: "Gezellige sportsbar in Vlagtwedde voor een drankje en sport kijken.", category: "activiteit", distance: 1, image: "https://www.sportplazavlagtwedde.nl/dynamic/image/248d9fe116df64a804cfc1eabb862995a03c01a5b90005ef4915078bbb5ae4db/width=1200/height=450/image.webp", url: "https://www.sportplazavlagtwedde.nl" },
    { id: "3", title: "Winkelcentrum de Weiert", description: "Groot overdekt winkelcentrum in Emmen voor een dagje shoppen.", category: "shoppen", distance: 30, image: "https://winkelcentrumdeweiert.nl/wp-content/uploads/2021/07/winkelcentrum-emmen-16.06.40-1.png", url: "https://winkelcentrumdeweiert.nl" },
    { id: "4", title: "Wildlands Dierentuin Emmen", description: "Een uniek avonturenpark met drie verschillende werelden.", category: "attractie", distance: 30, image: "https://images.tripper.nl/wildlands-adventure-zoo-ticket-korting/a558c7.jpg?auto=format&auto=enhance&q=100", url: "https://www.wildlands.nl" },
    { id: "5", title: "Vestingdorp Bourtange", description: "Een uniek historisch verdedigingswerk. Stap terug in de tijd.", category: "bezienswaardigheid", distance: 10, image: "https://www.bungalowparkoverzicht.nl/app/uploads/2024/04/Vestingdorp-Bourtange.webp", url: "https://www.bourtange.nl" },
    { id: "6", title: "Natuurgebied Liefstinghsbroek", description: "Een prachtig oud bosgebied voor een rustige wandeling.", category: "bezienswaardigheid", distance: 2, image: "https://www.hetliefstinghsbroek.nl/fileadmin/user_upload/het-liefstinghsbroek/header-liefstinghsbroek.png", url: "https://www.staatsbosbeheer.nl/natuurgebieden/westerwolde" },
    { id: "7", title: "Hunebedcentrum Borger", description: "Ontdek de wereld van de hunebedbouwers.", category: "bezienswaardigheid", distance: 32, image: "https://www.hunebedcentrum.eu/wp-content/uploads/2021/05/hunebed-header2-1536x518.png", url: "https://www.hunebedcentrum.eu" },
    { id: "8", title: "Wonderwereld", description: "Ontdek, Beleef, Bewonder in de bossen van Ter Apel", category: "attractie", distance: 24, image: "https://wonderwereld.nl/wp-content/uploads/2023/04/IMG_3136.jpeg", url: "https://wonderwereld.nl" },
    { id: "9", title: "Buitencenturm Boomkroonpad", description: "Dit wandelpad leidt je hoog langs de toppen van de bomen.", category: "activiteit", distance: 32, image: "https://www.staatsbosbeheer.nl/-/media/hondsrug/hondsrug-boomkroonpad.jpg", url: "https://www.staatsbosbeheer.nl/uit-in-de-natuur/locaties/buitencentrum-boomkroonpad" }
  ];

  const WS_WORDS = ["PAASHAAS", "EIEREN", "VLAGTWEDDE", "GEZELLIG", "VOORJAAR", "KROKUS", "PASEN", "ONTBIJT", "BRUNCH", "CHOCOLADE"];
  let wsGrid = [];
  const BINGO_ITEMS = [
    { id: 1, text: "Een paashaas gezien" }, { id: 2, text: "Een geel ei gevonden" }, { id: 3, text: "Gezellig ontbeten" },
    { id: 4, text: "Iemand vrolijk pasen gewenst" }, { id: 5, text: "Chocolade gegeten" }, { id: 6, text: "Een vogel horen fluiten" },
    { id: 7, text: "Een narcis gezien" }, { id: 8, text: "Lekker gewandeld" }, { id: 9, text: "Iets met eieren gedaan" }
  ];
  let bingoState = JSON.parse(localStorage.getItem('paasBingoState')) || {};
  const soundBingoWin = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

  // 2. RENDERING FUNCTIES
  function renderActivities(filter = 'alle') {
    const grid = document.getElementById('activitiesGrid');
    const filtered = filter === 'alle' ? ACTIVITIES : ACTIVITIES.filter(a => a.category === filter);
    
    grid.innerHTML = filtered.map(a => {
      // De reistijd berekening (Afstand * 1.2 minuut per km + 2 min marge)
      const travelTime = Math.round(a.distance * 1.2) + 2;
      
      return `
        <div class="card">
          <div class="card-badges">
            <div class="badge">📍 ${a.distance} km</div>
            <div class="badge">🚗 ${travelTime} min</div>
          </div>
          <img src="${a.image}" class="card-img" alt="${a.title}">
          <div class="card-content">
            <div class="card-title">${a.title}</div>
            <div class="card-info">${a.description}</div>
            <a href="${a.url}" target="_blank" style="text-decoration:none; color:var(--accent); font-weight:800; font-size:0.9rem;">
              Bezoek Website →
            </a>
          </div>
        </div>`;
    }).join('');
  }

  function renderFilters() {
    const container = document.getElementById('filtersContainer');
    const categories = ['alle', 'bezienswaardigheid', 'attractie', 'activiteit', 'shoppen'];
    container.innerHTML = categories.map(cat => `
      <div class="filter-option" onclick="selectFilter('${cat}', this)">
        ${cat.charAt(0).toUpperCase() + cat.slice(1)}
      </div>
    `).join('');
  }

  function selectFilter(category, element) {
    document.querySelectorAll('.filter-option').forEach(opt => opt.classList.remove('active'));
    element.classList.add('active');
    renderActivities(category);
    toggleFilters();
  }

  function toggleFilters() {
    document.getElementById('filterOverlay').classList.toggle('visible');
  }

  // 3. MODALS & TOOLS
  window.openModal = (id) => document.getElementById(id).classList.add('visible');
  window.closeModal = (id) => document.getElementById(id).classList.remove('visible');

  // BINGO
  window.toggleBingo = (id) => {
    bingoState[id] = !bingoState[id];
    localStorage.setItem('paasBingoState', JSON.stringify(bingoState));
    renderBingo();
  };

  window.renderBingo = () => {
    const grid = document.getElementById('bingoGrid');
    const checkedCount = BINGO_ITEMS.filter(i => bingoState[i.id]).length;
    if(document.getElementById('bingoScore')) document.getElementById('bingoScore').textContent = `${checkedCount} / 9 afgevinkt`;
    
    if(grid) {
      grid.innerHTML = BINGO_ITEMS.map(item => `
        <div class="bingo-item ${bingoState[item.id] ? 'checked' : ''}" onclick="toggleBingo(${item.id})">
          <span class="bingo-text">${item.text}</span>
          <span class="bingo-check">🥚</span>
        </div>`).join('');
    }
  };

  // WEER
  async function fetchWeather() {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=52.87&longitude=7.07&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max&timezone=auto&forecast_days=4';
      const res = await fetch(url);
      const data = await res.json();
      const WMO = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️', 51:'🌧️', 61:'🌧️', 63:'🌧️', 80:'🌦️', 95:'⛈️' };
      
      if (document.getElementById('wIcon')) document.getElementById('wIcon').textContent = WMO[data.current.weather_code] || '⛅';
      if (document.getElementById('wTemp')) document.getElementById('wTemp').textContent = Math.round(data.current.temperature_2m) + '°';
      
      const daysEl = document.getElementById('weatherDays');
      if (daysEl) {
        const daysNL = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
        daysEl.innerHTML = data.daily.time.map((t, i) => `
          <div class="weather-day ${i === 0 ? 'today' : ''}">
            <div class="wd-name">${i === 0 ? 'NU' : daysNL[new Date(t).getDay()]}</div>
            <div class="wd-icon">${WMO[data.daily.weather_code[i]] || '⛅'}</div>
            <div class="wd-temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
          </div>`).join('');
      }
    } catch(e) { console.error("Weer error", e); }
  }

  // WOORDZOEKER (Basis)
  function initWordSearch() {
    const size = 12;
    wsGrid = Array(size).fill().map(() => Array(size).fill(''));
    // (Hulpfuncties canPlace en renderWS moeten hieronder staan)
    renderWS(); 
  }

  function renderWS() {
    const gridEl = document.getElementById('wsGrid');
    if(!gridEl) return;
    gridEl.innerHTML = 'Letters laden...'; // Versimpeld voor nu
  }

  // INITIALISATIE
  renderActivities();
  renderFilters();
  renderBingo();
  fetchWeather();
</script>

</body>
</html>
