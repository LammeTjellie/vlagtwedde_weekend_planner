<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Weekend Planner Vlagtwedde - Pasen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ... (Stijlen blijven grotendeels gelijk aan de vorige versie) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fdfcf9;
      --stone-100: #f5f5f0;
      --stone-200: #e7e5e0;
      --stone-400: #a8a29e;
      --stone-500: #78716c;
      --stone-900: #1c1917;
      --orange: #ea580c;
      --easter-green: #dcfce7;
      --easter-yellow: #fef9c3;
    }
    body { background: var(--bg); color: var(--stone-900); font-family: 'DM Sans', sans-serif; }
    header { padding: 4rem 1.5rem 3rem; border-bottom: 6px solid var(--easter-green); background: linear-gradient(to bottom, #fff, var(--easter-yellow)); position: relative; overflow: hidden; }
    .header-inner { max-width: 1024px; margin: 0 auto; position: relative; z-index: 1; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 4rem); font-style: italic; }
    h1 span { font-style: normal; font-family: 'DM Sans', sans-serif; font-weight: 900; text-transform: uppercase; color: var(--orange); display: block; font-size: 0.4em; letter-spacing: 0.1em; }
    
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; cursor: pointer; text-decoration: none; color: inherit; transition: 0.2s; }
    .btn-primary { background: var(--stone-900); color: white; border-color: var(--stone-900); width: 100%; justify-content: center; margin-top: 1rem; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 2rem; }
    .filter-btn { padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 700; border: 1px solid var(--stone-200); background: white; color: var(--stone-500); cursor: pointer; }
    .filter-btn.active { background: var(--stone-900); color: white; border-color: var(--stone-900); }

    main { max-width: 1024px; margin: 0 auto; padding: 3rem 1.5rem; }
    .activities-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 640px) { .activities-grid { grid-template-columns: repeat(2, 1fr); } }

    .activity-card { background: white; border: 1px solid var(--stone-200); border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; }
    .card-image-wrap { aspect-ratio: 16/10; overflow: hidden; position: relative; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    
    .card-badge-top { position: absolute; top: 1rem; left: 1rem; }
    .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; background: white; border: 1px solid var(--stone-200); }
    
    .card-badge-bottom { position: absolute; bottom: 1rem; left: 1rem; display: flex; gap: 0.5rem; }
    .meta-pill { background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); padding: 0.4rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
    .meta-pill:hover { border-color: var(--orange); background: white; }

    .card-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; margin-bottom: 0.5rem; }
    .card-desc { color: var(--stone-500); font-size: 0.875rem; line-height: 1.6; margin-bottom: 1rem; flex-grow: 1; }

    /* Modal styles (Bingo & Weer) */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.visible { display: flex; }
    .modal-panel { background: var(--stone-900); color: white; border-radius: 2rem; padding: 2rem; width: 100%; max-width: 400px; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    
    .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1rem; padding: 2px; }
    .bingo-item { aspect-ratio: 1/1; background: #292524; border-radius: 1rem; padding: 0.5rem; font-size: 0.7rem; text-align: center; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid transparent; }
    .bingo-item.checked { background: var(--orange); border-color: white; }

    .weather-days { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 1rem; }
    .weather-day { background: #292524; padding: 0.75rem; border-radius: 1rem; text-align: center; }
    .weather-day.today { background: var(--orange); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">🐰 Pasen 2026</div>
    <h1><span>Weekend Planner</span>Vlagtwedde</h1>
    <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem;">
      <button class="btn" onclick="openModal('bingoModal')">🧺 Bingo</button>
      <button class="btn" onclick="openModal('weatherModal')"><span id="wIcon">⛅</span> <span id="wTemp">--°</span></button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alles</button>
      <button class="filter-btn" onclick="setFilter('bezienswaardigheid', this)">Bezienswaardigheid</button>
      <button class="filter-btn" onclick="setFilter('attractie', this)">Attractie</button>
      <button class="filter-btn" onclick="setFilter('activiteit', this)">Activiteit</button>
      <button class="filter-btn" onclick="setFilter('idee', this)">Idee</button>
    </div>
  </div>
</header>

<main>
  <div class="activities-grid" id="activitiesGrid"></div>
</main>

<div class="modal-overlay" id="bingoModal" onclick="if(event.target===this)closeModal('bingoModal')">
  <div class="modal-panel">
    <button class="modal-close" onclick="closeModal('bingoModal')">✕</button>
    <h2 style="font-family:'Playfair Display'; font-style:italic; margin-bottom:1rem;">Paas Bingo 🥚</h2>
    <div class="bingo-grid" id="bingoGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="weatherModal" onclick="if(event.target===this)closeModal('weatherModal')">
  <div class="modal-panel">
    <button class="modal-close" onclick="closeModal('weatherModal')">✕</button>
    <h2 style="font-family:'Playfair Display'; font-style:italic; margin-bottom:1rem;">Weersverwachting 🌤️</h2>
    <div class="weather-days" id="weatherDays"></div>
  </div>
</div>

<script>
  // DATA MET WEBSITE LINKS
  const ACTIVITIES = [
    { id: "1", title: "Dinopark Landgoed Tenaxx", description: "Park vol dino's op ware grootte en een dinomuseum.", category: "attractie", distance: 10, image: "https://dinoparklandgoedtenaxx.nl/wp-content/uploads/2023/03/T-Rex-Dinopark-Tenaxx.jpg", url: "https://dinoparklandgoedtenaxx.nl/" },
    { id: "2", title: "Sportsbar De Dribbel", description: "Gezellige bar op het park voor sport en een drankje.", category: "activiteit", distance: 1, image: "https://www.sportplazavlagtwedde.nl/sportsbar-de-dribbel/dribbel-foto.jpg", url: "https://www.sportplazavlagtwedde.nl/sportsbar-de-dribbel/" },
    { id: "3", title: "Winkelcentrum de Weiert", description: "Groot overdekt winkelcentrum in het hart van Emmen.", category: "idee", distance: 30, image: "https://winkelcentrumdeweiert.nl/wp-content/uploads/2021/07/winkelcentrum-emmen.png", url: "https://winkelcentrumdeweiert.nl/" },
    { id: "4", title: "Wildlands Adventure Zoo", description: "Ontdek de werelden Jungola, Serenga en Nortica.", category: "attractie", distance: 30, image: "https://www.wildlands.nl/uploads/Wildlands_safari_1280x720.jpg", url: "https://www.wildlands.nl/" },
    { id: "5", title: "Vestingdorp Bourtange", description: "Stap terug in de tijd in deze unieke historische vesting.", category: "bezienswaardigheid", distance: 10, image: "https://www.bourtange.nl/uploads/Vesting_Bourtange_Lucht.jpg", url: "https://www.bourtange.nl/" },
    { id: "6", title: "Liefstinghsbroek", description: "Prachtig oud bosgebied voor een natuurwandeling.", category: "bezienswaardigheid", distance: 2, image: "https://www.hetliefstinghsbroek.nl/header.png", url: "https://www.staatsbosbeheer.nl/natuurgebieden/westerwolde" },
    { id: "7", title: "Hunebedcentrum Borger", description: "Bekijk het grootste hunebed van Nederland.", category: "bezienswaardigheid", distance: 32, image: "https://www.hunebedcentrum.eu/wp-content/uploads/2021/05/hunebed.png", url: "https://www.hunebedcentrum.eu/" }
  ];

  const BINGO_ITEMS = [
    "Rudi zegt: 'Laatste jaar!'", "Te lang op de wc", "Stinkscheet gelaten", 
    "Harry slaapt op de bank", "Anouk zakt door stoel", "Kind valt uit bed",
    "Iemand zoekt z'n bril", "Paasei al gesmolten", "Valse bingo!"
  ];

  let currentFilter = 'alle';
  let bingoState = JSON.parse(localStorage.getItem('bingo_v2') || '[]');

  // SORTEREN: Verste afstand bovenaan (Descending)
  const sortedActivities = [...ACTIVITIES].sort((a, b) => b.distance - a.distance);

  function openMaps(destination) {
    const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination + " Vlagtwedde")}`;
    window.open(url, '_blank');
  }

  function renderActivities() {
    const grid = document.getElementById('activitiesGrid');
    const filtered = currentFilter === 'alle' ? sortedActivities : sortedActivities.filter(a => a.category === currentFilter);
    
    grid.innerHTML = filtered.map(a => `
      <div class="activity-card">
        <div class="card-image-wrap">
          <img src="${a.image}" alt="${a.title}">
          <div class="card-badge-top"><span class="badge">${a.category}</span></div>
          <div class="card-badge-bottom">
            <div class="meta-pill" onclick="openMaps('${a.title}')">📍 ${a.distance} km</div>
            <div class="meta-pill" onclick="openMaps('${a.title}')">🕒 ± ${Math.round(a.distance * 1.5)} min</div>
          </div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${a.title}</h3>
          <p class="card-desc">${a.description}</p>
          <a href="${a.url}" target="_blank" class="btn btn-primary">Bezoek website</a>
        </div>
      </div>
    `).join('');
  }

  function renderBingo() {
    const grid = document.getElementById('bingoGrid');
    grid.innerHTML = BINGO_ITEMS.map((text, i) => `
      <div class="bingo-item ${bingoState.includes(i) ? 'checked' : ''}" onclick="toggleBingo(${i})">
        ${text}
      </div>
    `).join('');
  }

  function toggleBingo(i) {
    if(bingoState.includes(i)) bingoState = bingoState.filter(item => item !== i);
    else bingoState.push(i);
    localStorage.setItem('bingo_v2', JSON.stringify(bingoState));
    renderBingo();
  }

  async function fetchWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.02&longitude=7.11&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max&timezone=Europe%2FAmsterdam&forecast_days=4');
      const data = await res.json();
      document.getElementById('wTemp').textContent = Math.round(data.current.temperature_2m) + '°';
      const WMO = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 61:'🌧️' };
      document.getElementById('weatherDays').innerHTML = data.daily.time.map((t, i) => `
        <div class="weather-day ${i===0?'today':''}">
          <div style="font-size:0.6rem;">${new Date(t).toLocaleDateString('nl-NL', {weekday:'short'})}</div>
          <div style="font-size:1.2rem; margin:0.2rem 0;">${WMO[data.daily.weathercode[i]] || '⛅'}</div>
          <div style="font-weight:900;">${Math.round(data.daily.temperature_2m_max[i])}°</div>
        </div>
      `).join('');
    } catch(e) {}
  }

  function setFilter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderActivities();
  }

  function openModal(id) { document.getElementById(id).classList.add('visible'); }
  function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

  renderActivities();
  renderBingo();
  fetchWeather();
</script>
</body>
</html>
